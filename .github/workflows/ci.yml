name: Continuous Integration

permissions:
  contents: write

on:
  push:
    branches:
      - master
      - dev
      - 'feature/**'
    tags:
      - v[0-9]+.[0-9]+.[0-9]+

  pull_request:
    branches:
      - master
      - dev

  workflow_dispatch:

env:
  USE_TMATE: false

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Python and dependencies
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r support/python/requirements.txt

      - name: Make clang-format executable
        run: chmod +x support/script/clang-format-runner.sh

      - name: Run clang-format lint
        run: pre-commit run clang-format --all-files

      - name: Run cmake-format lint
        run: pre-commit run cmake-format --all-files

      - name: Cache Cppcheck
        uses: actions/cache@v5
        id: cache-cppcheck
        with:
          path: ~/.local/cppcheck-2.17.1
          key: cppcheck-2.17.1-${{ runner.os }}

      - name: Install build dependencies for Cppcheck
        if: steps.cache-cppcheck.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libpcre3-dev

      - name: Build and install Cppcheck
        if: steps.cache-cppcheck.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          wget https://github.com/danmar/cppcheck/archive/refs/tags/2.17.1.tar.gz
          tar -xzf 2.17.1.tar.gz
          cd cppcheck-2.17.1
          mkdir build
          cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=$HOME/.local/cppcheck-2.17.1 -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
          make install

      - name: Add Cppcheck to PATH
        run: echo "$HOME/.local/cppcheck-2.17.1/bin" >> $GITHUB_PATH

      - name: Verify Cppcheck version
        run: |
          cppcheck --version
          which cppcheck

      - name: Run cppcheck lint
        run: pre-commit run cppcheck --all-files

      - name: Run black-format lint
        run: pre-commit run black-format --all-files

  test:
    needs: [lint]

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
        configuration: [Debug, Release]
        include:
          - os: ubuntu-22.04
            triplet: x64-linux
          - os: macos-14
            triplet: universal-osx
          - os: windows-2022
            triplet: x64-windows-static-md-v142

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-tags: true
          fetch-depth: 0
          ref: ${{ github.ref }}

      - uses: ./.github/actions/setup_tools_shared

      # Generate build number based on offset from former AppVeyor CI machine
      - uses: ./.github/actions/generate_offset_run_number

      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            externals/googletest
            externals/osg
            externals/sumo
            externals/implot
            resources/models
          key: ${{ runner.os }}-external-resources

      # Phase A: Build and install asam-osi-utilities via vcpkg
      # On Windows, match esmini's build configuration (MSVC CRT requires matching Debug/Release).
      # On Linux/macOS, always build Release (static libs are config-agnostic).
      - name: Setup OSI Utilities
        id: osi
        uses: ./.github/actions/setup_osi_utilities
        with:
          triplet: ${{ matrix.triplet }}
          configuration: ${{ runner.os == 'Windows' && matrix.configuration || 'Release' }}
          overlay-triplets: ${{ github.workspace }}/support/vcpkg-triplets
          cmake-generator: ${{ runner.os == 'Windows' && '-G "Visual Studio 17 2022" -T v142 -A x64' || '' }}

      - name: Setup compiler cache
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            which ccache || sudo apt-get install -y -qq ccache
          elif [ "$RUNNER_OS" = "macOS" ]; then
            which ccache || brew install ccache
          fi
          ccache --zero-stats
          ccache --max-size=500M

      - name: Restore compiler cache
        if: runner.os != 'Windows'
        uses: actions/cache@v5
        with:
          path: ${{ runner.os == 'macOS' && '~/Library/Caches/ccache' || '~/.cache/ccache' }}
          key: ccache-${{ runner.os }}-${{ matrix.configuration }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ matrix.configuration }}-
            ccache-${{ runner.os }}-

      - name: CMake Configure
        run: >
          cmake --preset
          ${{ runner.os == 'Windows' && 'ci-windows' || runner.os == 'macOS' && 'ci-macos' || 'ci-linux' }}
          -DESMINI_BUILD_VERSION=${{ env.BUILD_NUMBER }}
          -DCMAKE_BUILD_TYPE:STRING=${{ matrix.configuration }}

      - name: CMake Build
        run: cmake --build build --config ${{ matrix.configuration }} --target install -j 2

      - name: Show compiler cache stats
        if: runner.os != 'Windows'
        shell: bash
        run: ccache --show-stats 2>/dev/null || true

      - name: Compile minimal C example
        if: runner.os == 'Linux'
        run: |
          echo -e '#include "esminiLib.hpp"\n\nint main()\n{\n    return 0;\n}' > pure-c.c
          gcc pure-c.c -I EnvironmentSimulator/Libraries/esminiLib/ ./bin/libesminiLib.so -o pure-c
          ./pure-c

      - name: Compile C# wrapper tests
        if: runner.os == 'Windows'
        run: |
          cd test/CSharpWrappers
          cmake . -B build -G "Visual Studio 17 2022" -T v142 -A x64 -DUSE_OSI=ON
          cmake --build build --config ${{ matrix.configuration }}

      - name: CMake Build OSMP FMU
        if: runner.os == 'Linux'
        run: |
          cd OSMP_FMU
          mkdir -p build
          cd build
          cmake .. \
            -DOSI_UTILITIES_PREFIX=$ESMINI_OSI_PREFIX \
            -DCMAKE_PREFIX_PATH="$ESMINI_CMAKE_PREFIX_PATH" \
            -DProtobuf_PROTOC_EXECUTABLE=$ESMINI_PROTOC
          cmake --build . -j2

      - name: Validate OSMP FMU
        if: runner.os == 'Linux'
        run: |
          cd OSMP_FMU/build
          python3 -m venv .venv
          source .venv/bin/activate
          pip3 install fmpy
          fmpy validate esmini.fmu

      - name: Run OSMP FMU
        if: runner.os == 'Linux'
        run: |
          cd OSMP_FMU/build
          python3 -m venv .venv
          source .venv/bin/activate
          pip3 install fmpy
          fmpy simulate esmini.fmu --start-values xosc_path ../../resources/xosc/cut-in.xosc

      - name: Run Tests - Unix
        if: runner.os != 'Windows'
        # Use xvfb on Linux only
        run: ${{ matrix.os == 'ubuntu-22.04' && 'xvfb-run' || '' }} ./scripts/run_tests.sh -b ${{ matrix.configuration }} -p

      - uses: ./.github/actions/setup_mesa
        with:
          configuration: ${{ matrix.configuration }}

      - name: Run Tests - Windows
        if: runner.os == 'Windows'
        env:
          GALLIUM_DRIVER: llvmpipe
          MESA_GL_VERSION_OVERRIDE: 4.5
        shell: bash
        run: ./scripts/run_tests.sh -b ${{ matrix.configuration }} -p -w

      - uses: ./.github/actions/upload_esmini_artifacts
        if: matrix.configuration == 'Release'

      - name: Debugging with tmate
        if: ${{ failure() && env.USE_TMATE == 'true' }}
        uses: mxschmitt/action-tmate@v3

  test-no-external-modules:
    needs: [lint]

    strategy:
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
        configuration: [Debug, Release]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: ./.github/actions/setup_tools_shared

      # Generate build number based on offset from former AppVeyor CI machine
      - uses: ./.github/actions/generate_offset_run_number

      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            externals/googletest
            externals/osg
            externals/sumo
            resources/models
          key: ${{ runner.os }}-external-resources-slim
      # run xml validation only here.
      # 1. Only needs to run once
      # 2. It's not dependent on configuration, so it can be run by any config
      # 3. This configuration is faster so validation won't add to total CI run time
      - name: Run schema validation
        if: runner.os == 'Linux' && matrix.configuration == 'Release'
        run: python3 scripts/run_schema_comply.py resources EnvironmentSimulator

      - name: Run C# wrapper check
        if: runner.os == 'Windows' && matrix.configuration == 'Release'
        uses: ./.github/actions/wrapper_check

      - name: CMake Configure
        run: >
          cmake --preset
          ${{ runner.os == 'Windows' && 'ci-no-externals-windows' || runner.os == 'macOS' && 'ci-no-externals-macos' || 'ci-no-externals-linux' }}
          -DESMINI_BUILD_VERSION=${{ env.BUILD_NUMBER }}
          -DCMAKE_BUILD_TYPE:STRING=${{ matrix.configuration }}

      - name: CMake Build
        run: cmake --build build --config ${{ matrix.configuration }} --target install -j 2

      - name: Compile C# wrapper tests
        if: runner.os == 'Windows'
        run: |
          cd test/CSharpWrappers
          cmake . -B build -G "Visual Studio 17 2022" -T v142 -A x64 -DUSE_OSI=OFF
          cmake --build build --config ${{ matrix.configuration }}

      - name: Run Tests - Unix
        if: runner.os != 'Windows'
        # Use xvfb on Linux only
        run: ${{ matrix.os == 'ubuntu-22.04' && 'xvfb-run' || '' }} ./scripts/run_tests.sh -b ${{ matrix.configuration }} -p

      - name: Run Tests - Windows
        if: runner.os == 'Windows'
        env:
          GALLIUM_DRIVER: softpipe
          MESA_GL_VERSION_OVERRIDE: 4.5
        shell: bash
        run: ./scripts/run_tests.sh -b ${{ matrix.configuration }} -p -w

      - name: Debugging with tmate
        if: ${{ failure() && env.USE_TMATE == 'true' }}
        uses: mxschmitt/action-tmate@v3

  release:
    needs: [test, test-no-external-modules]
    if: github.ref_type == 'tag'

    strategy:
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: ${{ github.ref }}

      # Generate build number based on offset from former AppVeyor CI machine
      - uses: ./.github/actions/generate_offset_run_number

      - uses: actions/download-artifact@v8
        with:
          name: esmini-bin_${{ runner.os }}

      - uses: actions/download-artifact@v8
        with:
          name: esmini-demo_${{ runner.os }}

      - name: Determine version from tag
        shell: bash
        run: echo "ESMINI_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: 'esmini ${{ env.ESMINI_VERSION }} (build ${{ env.BUILD_NUMBER }})'
          body: 'Demo and binaries. For information about changes and new features see [release notes](https://github.com/esmini/esmini/blob/master/release_notes.md).'
          files: |
            esmini-bin_${{ runner.os }}.zip
            esmini-demo_${{ runner.os }}.zip
