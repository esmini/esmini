name: WrapperCheck
description: Check consistency of esminiRMLib C# wrapper

runs:
  using: 'composite'

  steps:
  - name: Build esminiRMLib wrapper generator
    shell: bash
    run: |
      cd EnvironmentSimulator/Libraries/esminiRMLib/CSWrapperGenerator
      dotnet build --configuration Release

  - name: Generate esminiRMLib wrapper
    shell: bash
    run: |
      cd EnvironmentSimulator/Libraries/esminiRMLib/CSWrapperGenerator
      ./bin/Release/net8.0/win-x64/Cpp2CSWrapperCreator.exe ../esminiRMLib.hpp esminiRMWrapper.cs

  - name: Upload generated esminiRMLib wrapper
    uses: actions/upload-artifact@v4.3.6
    with:
      name: esminiRMWrapper
      path: EnvironmentSimulator/Libraries/esminiRMLib/CSWrapperGenerator/esminiRMWrapper.cs

  - name: Check esminiRMWrapper
    # Check that generated wrapper is identical to the checked in one
    shell: bash
    run: |
      cd EnvironmentSimulator/Libraries/esminiRMLib/CSWrapperGenerator
      diff ../esminiRMWrapper.cs esminiRMWrapper.cs

  - name: Generate esminiLib wrapper
    shell: bash
    run: |
      cd EnvironmentSimulator/Libraries/esminiLib/CSWrapperGenerator
      python ./generate_esminiLib_cs_wrapper.py

  - name: Upload generated esminiLib wrapper
    uses: actions/upload-artifact@v4.3.6
    with:
      name: esminiWrapper
      path: EnvironmentSimulator/Libraries/esminiLib/CSWrapperGenerator/ESMiniWrapper.cs

  - name: Check esminiWrapper
    # Check that generated wrapper is identical to the checked in one
    shell: bash
    run: |
      cd EnvironmentSimulator/Libraries/esminiLib/CSWrapperGenerator
      diff ../esminiWrapper.cs esminiWrapper.cs

  - name: What to do
    shell: bash
    if: ${{ failure() }}
    run: |
      echo "Warning::If this job fails, check the diff output above."
      echo "The failing wrapper needs to be regenerated and committed"
      echo ""
      echo "esminiRMWrapper>"
      echo "On Windows, run from CSWrapperGenerator:"
      echo "dotnet build --configuration Release"
      echo ".\bin\Release\net8.0\win-x64\Cpp2CSWrapperCreator.exe ./esminiRMLib.hpp ../esminiRMWrapper.cs"
      echo ""
      echo "esminiWrapper>"
      echo "The esminiLib wrapper is generated by Python script on any platform.
      echo "run from CSWrapperGenerator:
      echo "python ./generate_esminiLib_cs_wrapper.py"
      echo ""
      echo "Alternatively, use the generated ones in the 'Upload generated wrapper' job"
